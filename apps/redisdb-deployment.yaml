apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-db
  labels:
    app: redis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis-db
        image: redis:7-alpine
---
apiVersion: v1
kind: Service
metadata:
  name: redis-clusterip
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
 